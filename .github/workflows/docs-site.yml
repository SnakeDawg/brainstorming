# Builds the kb/ folder into a navigable website (MkDocs Material) and
# publishes it to GitHub Pages whenever main changes.
# Prerequisite: repo Settings -> Pages -> Source = "GitHub Actions".
# Without Actions/Pages, the same site runs locally: pip install
# mkdocs-material && mkdocs serve.
name: Docs site

on:
  push:
    branches: [main]
    paths:
      - "kb/**"
      - "mkdocs.yml"
      - ".github/workflows/docs-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install mkdocs-material
      - run: mkdocs build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
